<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 800" fill="none">
  <rect width="1280" height="800" fill="#09090b"/>
  <!-- Dot grid pattern -->
  <defs>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1" fill="#ffffff" opacity="0.06"/>
    </pattern>
    <radialGradient id="fade" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.04"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1280" height="800" fill="url(#dots)"/>
  <ellipse cx="640" cy="400" rx="500" ry="350" fill="url(#fade)"/>
  <!-- Terminal window -->
  <rect x="390" y="250" width="500" height="300" rx="12" fill="#111118" stroke="#222233" stroke-width="1"/>
  <!-- Terminal header -->
  <rect x="390" y="250" width="500" height="36" rx="12" fill="#161622"/>
  <rect x="390" y="274" width="500" height="12" fill="#161622"/>
  <circle cx="412" cy="268" r="6" fill="#ff5f57"/>
  <circle cx="432" cy="268" r="6" fill="#febc2e"/>
  <circle cx="452" cy="268" r="6" fill="#28c840"/>
  <!-- Terminal content -->
  <text x="416" y="316" font-family="monospace" font-size="14" fill="#6366f1">$</text>
  <text x="434" y="316" font-family="monospace" font-size="14" fill="#a1a1aa">npm run build</text>
  <text x="416" y="344" font-family="monospace" font-size="14" fill="#22c55e">Building...</text>
  <text x="416" y="380" font-family="monospace" font-size="14" fill="#6366f1">$</text>
  <text x="434" y="380" font-family="monospace" font-size="14" fill="#a1a1aa">git push origin main</text>
  <text x="416" y="408" font-family="monospace" font-size="14" fill="#eab308">Deploying soon...</text>
  <!-- Blinking cursor -->
  <rect x="416" y="434" width="8" height="16" fill="#8b5cf6" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Bottom label -->
  <text x="640" y="610" text-anchor="middle" font-family="system-ui, sans-serif" font-size="20" font-weight="500" letter-spacing="4" fill="#ffffff" opacity="0.25">EN CONSTRUCTION</text>
</svg>
